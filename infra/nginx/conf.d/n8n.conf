# n8n.suzanneravenall.com — workflow automation
# WebSocket support is required — n8n uses persistent connections for its editor
# and for SSE-based workflow execution feedback.

server {
    listen 80;
    server_name n8n.suzanneravenall.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name n8n.suzanneravenall.com;

    ssl_certificate     /etc/letsencrypt/live/n8n.suzanneravenall.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n8n.suzanneravenall.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://n8n:5678;

        # WebSocket upgrade — required for n8n editor and execution streaming
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Long timeout — n8n workflows can run for extended periods
        proxy_read_timeout 86400;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
